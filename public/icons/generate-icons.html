<!DOCTYPE html>
<!--
  Open this file in a browser to generate PWA icons.
  Click each button to download the icon as PNG.
  Place icon-192.png and icon-512.png in /public/icons/
-->
<html>
<head><title>Generate Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:24px">
  <h2>Generador de iconos PWA — Prode Mundial 2026</h2>
  <p>Hacé click en cada botón para descargar el ícono correspondiente.</p>
  <div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:16px">
    <div>
      <canvas id="c192" width="192" height="192"></canvas><br>
      <button onclick="dl('c192','icon-192.png')" style="margin-top:8px;padding:8px 16px;cursor:pointer">
        Descargar icon-192.png
      </button>
    </div>
    <div>
      <canvas id="c512" width="512" height="512"></canvas><br>
      <button onclick="dl('c512','icon-512.png')" style="margin-top:8px;padding:8px 16px;cursor:pointer">
        Descargar icon-512.png
      </button>
    </div>
  </div>
  <script>
    function draw(id) {
      const c = document.getElementById(id)
      const size = c.width
      const ctx = c.getContext('2d')
      const r = size * 0.18
      ctx.beginPath()
      ctx.moveTo(r,0); ctx.lineTo(size-r,0)
      ctx.quadraticCurveTo(size,0,size,r)
      ctx.lineTo(size,size-r)
      ctx.quadraticCurveTo(size,size,size-r,size)
      ctx.lineTo(r,size)
      ctx.quadraticCurveTo(0,size,0,size-r)
      ctx.lineTo(0,r)
      ctx.quadraticCurveTo(0,0,r,0)
      ctx.fillStyle='#075e38'
      ctx.fill()
      ctx.font = `${size*0.55}px serif`
      ctx.textAlign='center'
      ctx.textBaseline='middle'
      ctx.fillText('🏆', size/2, size/2 + size*0.04)
    }
    draw('c192'); draw('c512')

    function dl(id, name) {
      const a = document.createElement('a')
      a.href = document.getElementById(id).toDataURL('image/png')
      a.download = name
      a.click()
    }
  </script>
</body>
</html>
